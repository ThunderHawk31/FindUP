[pytest]
# Configuration pytest pour FindUP backend
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short
markers =
    auth: Tests d'authentification
    chat: Tests du chat IA
    artisans: Tests des artisans
    profile: Tests du profil utilisateur
    favoris: Tests des favoris
    historique: Tests de l'historique
    transactions: Tests des transactions
    seo: Tests SEO
    public: Tests des routes publiques
    integration: Tests d'intégration
    security: Tests de sécurité
    slow: Tests lents (rate limiting, etc.)
